<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Game top-up illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0709"/>
      <stop offset="1" stop-color="#0f0a0c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff3a44"/>
      <stop offset="1" stop-color="#9b101f"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="960" height="540" rx="28" fill="url(#bg)"/>
  <circle cx="190" cy="120" r="130" fill="url(#accent)" filter="url(#soft)" opacity="0.40"/>
  <circle cx="820" cy="420" r="180" fill="url(#accent)" filter="url(#soft)" opacity="0.22"/>

  <g fill="none" stroke="#ffffff" stroke-opacity="0.16">
    <rect x="80" y="88" width="800" height="364" rx="24"/>
  </g>

  <g transform="translate(170 155)">
    <rect x="0" y="0" width="620" height="250" rx="24" fill="#ffffff" opacity="0.06" stroke="#ff6a75" stroke-opacity="0.28"/>
    <rect x="34" y="34" width="260" height="22" rx="11" fill="#ffffff" opacity="0.12"/>
    <rect x="34" y="70" width="338" height="14" rx="7" fill="#ffffff" opacity="0.10"/>
    <rect x="34" y="98" width="300" height="14" rx="7" fill="#ffffff" opacity="0.08"/>

    <g transform="translate(34 138)">
      <rect x="0" y="0" width="140" height="84" rx="18" fill="url(#accent)" opacity="0.92"/>
      <circle cx="38" cy="42" r="22" fill="#ffffff" opacity="0.22"/>
      <path d="M38 26 v32" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
      <path d="M28 42 h20" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
      <rect x="160" y="10" width="124" height="24" rx="12" fill="#ffffff" opacity="0.10"/>
      <rect x="160" y="46" width="92" height="24" rx="12" fill="#ffffff" opacity="0.10"/>
      <rect x="160" y="82" width="140" height="24" rx="12" fill="#ffffff" opacity="0.10"/>
    </g>

    <g transform="translate(430 50)">
      <rect x="0" y="0" width="156" height="156" rx="22" fill="#ffffff" opacity="0.06" stroke="#ffffff" stroke-opacity="0.14"/>
      <path d="M46 56 h64" stroke="#ff6a75" stroke-width="10" stroke-linecap="round" opacity="0.75"/>
      <path d="M78 56 v64" stroke="#ff6a75" stroke-width="10" stroke-linecap="round" opacity="0.75"/>
      <circle cx="78" cy="92" r="46" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="10"/>
    </g>
