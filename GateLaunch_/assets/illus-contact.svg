      <path d="M34 48 h212 v96 h-212z" fill="#ffffff" opacity="0.06" stroke="#ffffff" stroke-opacity="0.14"/>
      <path d="M34 48 l106 72 l106-72" fill="none" stroke="#ff6a75" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>
      <rect x="34" y="156" width="212" height="12" rx="6" fill="#ffffff" opacity="0.10"/>
    </g>

    <g transform="translate(388 62)">
      <rect x="0" y="0" width="234" height="176" rx="22" fill="#ffffff" opacity="0.05" stroke="#ffffff" stroke-opacity="0.14"/>
      <circle cx="64" cy="64" r="30" fill="url(#accent)" opacity="0.92"/>
      <path d="M50 64 h28" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
      <path d="M64 50 v28" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
      <rect x="110" y="50" width="96" height="12" rx="6" fill="#ffffff" opacity="0.12"/>
      <rect x="110" y="72" width="110" height="12" rx="6" fill="#ffffff" opacity="0.10"/>
      <rect x="20" y="130" width="194" height="12" rx="6" fill="#ffffff" opacity="0.10"/>
    </g>

    <rect x="58" y="264" width="564" height="14" rx="7" fill="#ffffff" opacity="0.09"/>
