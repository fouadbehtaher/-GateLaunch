<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Contact and portfolio illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0709"/>
      <stop offset="1" stop-color="#121214"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff3a44"/>
      <stop offset="1" stop-color="#9b101f"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="960" height="540" rx="28" fill="url(#bg)"/>
  <circle cx="210" cy="420" r="180" fill="url(#accent)" filter="url(#soft)" opacity="0.26"/>
  <circle cx="800" cy="120" r="160" fill="url(#accent)" filter="url(#soft)" opacity="0.22"/>

  <g transform="translate(140 120)">
    <rect x="0" y="0" width="680" height="300" rx="26" fill="#ffffff" opacity="0.06" stroke="#ff6a75" stroke-opacity="0.24"/>

    <g transform="translate(58 62)">
